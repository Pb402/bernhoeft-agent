<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bernhoeft Cálculos — Agente de Marketing</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #060E1A; font-family: 'Noto Sans', sans-serif; color: #fff; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: rgba(255,255,255,0.03); }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.12); border-radius: 3px; }
    @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
    .fade-in { animation: fadeIn 0.3s ease forwards; }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    const COLORS = {
      navy: "#0C2340",
      navyLight: "#3D4F66",
      red: "#E74C3C",
      redDark: "#C0392B",
      gray: "#9EA7B3",
      grayAlt: "#878787",
      white: "#FFFFFF",
      green: "#2ECC71",
      yellow: "#F1C40F",
    };

    const FORMAT_OPTIONS = [
      { id: "square",   label: "Post Quadrado",    size: "1080×1080",  icon: "⬛", aspect: 1 },
      { id: "vertical", label: "Post Vertical",    size: "1080×1350",  icon: "📱", aspect: 1350/1080 },
      { id: "stories",  label: "Stories / Reels",  size: "1080×1920",  icon: "🎬", aspect: 1920/1080 },
      { id: "slides",   label: "Apresentação",     size: "1920×1080",  icon: "🖥️", aspect: 1080/1920 },
    ];

    const TEMPLATE_OPTIONS = [
      { id: "conteudo",   label: "Post de Conteúdo",     icon: "📊" },
      { id: "evento",     label: "Evento / Mesa Redonda", icon: "🎯" },
      { id: "lancamento", label: "Lançamento",            icon: "🚀" },
      { id: "carrossel",  label: "Carrossel",             icon: "🔄" },
      { id: "depoimento", label: "Depoimento / Case",     icon: "🤝" },
      { id: "dado",       label: "Dado / Estatística",    icon: "📈" },
    ];

    const STEPS = ["Formato", "Template", "Conteúdo", "Preview & Gerar"];

    const inputStyle = {
      width: "100%",
      background: "rgba(255,255,255,0.05)",
      border: "1px solid rgba(255,255,255,0.1)",
      borderRadius: 8, padding: "10px 14px",
      color: "#fff", fontSize: 13, outline: "none",
      fontFamily: "'Noto Sans', sans-serif",
      transition: "border-color 0.2s",
    };

    function GeometricBg() {
      return (
        <svg style={{ position:"absolute", inset:0, width:"100%", height:"100%", pointerEvents:"none", zIndex:0 }}
          viewBox="0 0 1200 800" preserveAspectRatio="xMidYMid slice">
          <circle cx="1100" cy="-60" r="220" fill="none" stroke={COLORS.red} strokeWidth="3" opacity="0.2" />
          <circle cx="1080" cy="-40" r="160" fill="none" stroke={COLORS.red} strokeWidth="2" opacity="0.1" />
          <rect x="-60" y="680" width="160" height="160" fill="none" stroke={COLORS.navyLight} strokeWidth="2" opacity="0.25" transform="rotate(20 -60 680)" />
          <line x1="0" y1="200" x2="0" y2="600" stroke={COLORS.red} strokeWidth="1" opacity="0.15" />
          <rect x="600" y="760" width="8" height="8" fill={COLORS.red} opacity="0.4" />
          <rect x="640" y="760" width="8" height="8" fill={COLORS.red} opacity="0.25" />
          <rect x="680" y="760" width="8" height="8" fill={COLORS.red} opacity="0.15" />
        </svg>
      );
    }

    function LivePreview({ form }) {
      const { titulo, subtitulo, mensagem, selo, cta, formato, template } = form;
      const fmt = FORMAT_OPTIONS.find(f => f.id === formato) || FORMAT_OPTIONS[0];
      const isWide = fmt.aspect < 0.7;
      const previewH = isWide ? 150 : fmt.aspect > 1.5 ? 340 : fmt.aspect > 1.1 ? 280 : 240;

      const bgMap = {
        escuro: `linear-gradient(160deg, ${COLORS.navy} 0%, #081830 100%)`,
        preto: "linear-gradient(160deg, #1A1A1A 0%, #0D0D0D 100%)",
        gradiente: `linear-gradient(160deg, ${COLORS.navy} 0%, #051020 100%)`,
        branco: "#FFFFFF",
      };
      const isLight = form.bgStyle === "branco";

      return (
        <div style={{
          width: "100%", height: previewH,
          background: bgMap[form.bgStyle] || bgMap.escuro,
          borderRadius: 12, position: "relative", overflow: "hidden",
          fontFamily: "'Noto Sans', sans-serif",
          display: "flex", flexDirection: isWide ? "row" : "column",
          border: `1px solid rgba(255,255,255,0.08)`,
        }}>
          {/* Geometric canto sup direito */}
          <svg style={{ position:"absolute", top:0, right:0, width:90, height:90, pointerEvents:"none" }} viewBox="0 0 90 90">
            <circle cx="82" cy="8" r="44" fill="none" stroke={COLORS.red} strokeWidth="3" opacity="0.5" />
            <circle cx="82" cy="8" r="26" fill="none" stroke={COLORS.red} strokeWidth="2" opacity="0.3" />
          </svg>
          {/* Geometric canto inf esq */}
          <svg style={{ position:"absolute", bottom:0, left:0, width:60, height:60, pointerEvents:"none" }} viewBox="0 0 60 60">
            <rect x="-14" y="38" width="40" height="40" fill="none" stroke={COLORS.navyLight} strokeWidth="2" opacity="0.5" transform="rotate(15 -14 38)" />
          </svg>

          {selo && (
            <div style={{
              position:"absolute", top:10, right:8,
              background: COLORS.red, color:"#fff",
              fontSize:8, fontWeight:700, padding:"3px 8px",
              borderRadius:3, letterSpacing:1, textTransform:"uppercase", zIndex:2,
            }}>{selo}</div>
          )}

          <div style={{ position:"absolute", left:20, top:"15%", bottom:"15%", width:1, background:"rgba(255,255,255,0.15)" }} />

          <div style={{
            flex:1, padding: isWide ? "20px 28px" : "18px 22px",
            display:"flex", flexDirection:"column", justifyContent:"center",
            zIndex:1, marginLeft:10,
          }}>
            {template === "lancamento" && (
              <div style={{ color:COLORS.red, fontSize:8, fontWeight:800, letterSpacing:2, textTransform:"uppercase", marginBottom:6 }}>
                LANÇAMENTO 🚀
              </div>
            )}
            {template === "evento" && (
              <div style={{ color:COLORS.gray, fontSize:8, fontWeight:700, letterSpacing:2, textTransform:"uppercase", marginBottom:6 }}>
                MESA REDONDA 🎯
              </div>
            )}
            <div style={{
              color: isLight ? COLORS.navy : "#fff", fontWeight:800,
              fontSize: isWide ? 13 : 16, lineHeight:1.15, marginBottom:6,
              maxWidth: isWide ? "60%" : "100%",
            }}>
              {titulo || "Título do Post"}
            </div>
            {subtitulo && (
              <div style={{ color: isLight ? COLORS.navyLight : "rgba(255,255,255,0.7)", fontWeight:500, fontSize: isWide ? 9 : 11, marginBottom:8 }}>
                {subtitulo}
              </div>
            )}
            {mensagem && (
              <>
                <div style={{ width:32, height:1, background: isLight ? "rgba(0,0,0,0.2)" : "rgba(255,255,255,0.3)", marginBottom:8 }} />
                <div style={{ color: isLight ? COLORS.grayAlt : "rgba(255,255,255,0.6)", fontSize: isWide ? 8 : 9, lineHeight:1.5, maxWidth: isWide ? "55%" : "100%" }}>
                  {mensagem.slice(0, 120)}{mensagem.length > 120 ? "…" : ""}
                </div>
              </>
            )}
            {cta && (
              <div style={{
                display:"inline-flex", alignItems:"center", marginTop:10,
                background: COLORS.red, color:"#fff",
                borderRadius:20, padding:"4px 14px",
                fontSize:8, fontWeight:700, width:"fit-content",
              }}>
                {cta}
              </div>
            )}
          </div>

          <div style={{
            position:"absolute", bottom:10, left: isWide ? 28 : 22,
            color: isLight ? "rgba(0,0,0,0.3)" : "rgba(255,255,255,0.45)",
            fontSize:7, fontWeight:600, letterSpacing:1,
          }}>
            BERNHOEFT CÁLCULOS JUDICIAIS · @bernhoeftcalc
          </div>
        </div>
      );
    }

    function Section({ title, children }) {
      return (
        <div style={{ marginBottom:28 }}>
          <div style={{ display:"flex", alignItems:"center", gap:10, marginBottom:14 }}>
            <div style={{ width:3, height:18, background:COLORS.red, borderRadius:2 }} />
            <span style={{ color:COLORS.gray, fontSize:11, fontWeight:700, letterSpacing:2, textTransform:"uppercase" }}>{title}</span>
          </div>
          {children}
        </div>
      );
    }

    function Chip({ active, onClick, children }) {
      return (
        <button onClick={onClick} style={{
          background: active ? COLORS.red : "rgba(255,255,255,0.05)",
          border: `1px solid ${active ? COLORS.red : "rgba(255,255,255,0.12)"}`,
          color: active ? "#fff" : COLORS.gray,
          borderRadius:8, padding:"8px 14px",
          fontSize:12, fontWeight: active ? 700 : 400,
          cursor:"pointer", transition:"all 0.2s",
        }}>
          {children}
        </button>
      );
    }

    function Field({ label, children }) {
      return (
        <div style={{ marginBottom:16 }}>
          <label style={{ display:"block", color:COLORS.gray, fontSize:11, fontWeight:600, letterSpacing:1.5, textTransform:"uppercase", marginBottom:6 }}>
            {label}
          </label>
          {children}
        </div>
      );
    }

    function ApiKeyBanner({ apiKey, onSave }) {
      const [val, setVal] = useState(apiKey || "");
      const [show, setShow] = useState(false);
      const [saved, setSaved] = useState(false);

      const save = () => {
        onSave(val.trim());
        setSaved(true);
        setTimeout(() => setSaved(false), 2000);
      };

      if (!show && apiKey) return (
        <div style={{
          background:"rgba(46,204,113,0.06)", borderBottom:"1px solid rgba(46,204,113,0.15)",
          padding:"10px 32px", display:"flex", alignItems:"center", justifyContent:"space-between",
          fontSize:12,
        }}>
          <span style={{ color:"rgba(46,204,113,0.8)" }}>✓ API Key configurada — IA ativada</span>
          <button onClick={() => setShow(true)} style={{ background:"transparent", border:"none", color:COLORS.gray, cursor:"pointer", fontSize:11, textDecoration:"underline" }}>
            Alterar
          </button>
        </div>
      );

      return (
        <div style={{
          background:"rgba(231,76,60,0.06)", borderBottom:"1px solid rgba(231,76,60,0.15)",
          padding:"12px 32px", display:"flex", alignItems:"center", gap:12,
        }}>
          <span style={{ color:COLORS.gray, fontSize:12, whiteSpace:"nowrap" }}>🔑 Anthropic API Key:</span>
          <input
            type="password"
            value={val}
            onChange={e => setVal(e.target.value)}
            onKeyDown={e => e.key === "Enter" && save()}
            placeholder="sk-ant-..."
            style={{ ...inputStyle, flex:1, padding:"7px 12px", fontSize:12 }}
          />
          <button onClick={save} style={{
            background: saved ? "#2ECC71" : COLORS.red, color:"#fff", border:"none",
            borderRadius:6, padding:"7px 16px", fontWeight:700, fontSize:12,
            cursor:"pointer", whiteSpace:"nowrap", transition:"background 0.3s",
          }}>
            {saved ? "✓ Salva" : "Salvar"}
          </button>
          <a href="https://console.anthropic.com/keys" target="_blank" style={{ color:COLORS.gray, fontSize:11, whiteSpace:"nowrap" }}>
            Obter key →
          </a>
        </div>
      );
    }

    function BernhoeftAgent() {
      const [step, setStep] = useState(0);
      const [loading, setLoading] = useState(false);
      const [result, setResult] = useState(null);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem("bc_api_key") || "");
      const [form, setForm] = useState({
        formato: "square", template: "conteudo",
        titulo: "", subtitulo: "", mensagem: "",
        selo: "", rodape: "", cta: "",
        bgStyle: "escuro", tamanhoTitulo: "grande", notas: "",
      });

      const set = (key, val) => setForm(f => ({ ...f, [key]: val }));

      const saveApiKey = (key) => {
        setApiKey(key);
        localStorage.setItem("bc_api_key", key);
      };

      const callClaude = async (prompt, systemPrompt) => {
        if (!apiKey) throw new Error("API Key não configurada");
        const response = await fetch("https://api.anthropic.com/v1/messages", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-api-key": apiKey,
            "anthropic-version": "2023-06-01",
            "anthropic-dangerous-direct-browser-access": "true",
          },
          body: JSON.stringify({
            model: "claude-sonnet-4-6",
            max_tokens: 1200,
            system: systemPrompt,
            messages: [{ role: "user", content: prompt }],
          }),
        });
        if (!response.ok) {
          const err = await response.json().catch(() => ({}));
          throw new Error(err?.error?.message || `Erro HTTP ${response.status}`);
        }
        const data = await response.json();
        return data.content?.[0]?.text || "";
      };

      const generateBrief = async () => {
        if (!apiKey) {
          setResult({ error: "Configure a Anthropic API Key no topo da página para usar a IA." });
          return;
        }
        setLoading(true);
        setResult(null);
        try {
          const system = `Você é um especialista em marketing para a Bernhoeft Cálculos Judiciais.
Identidade visual: azul escuro #0C2340, vermelho #E74C3C, Noto Sans, estilo corporativo premium jurídico.
Gere APENAS um JSON válido com os campos abaixo (sem markdown, sem texto extra):
{
  "canvaQuery": "descrição curta em inglês para busca no Canva",
  "designType": "instagram_post | poster | presentation | flyer",
  "copyFinal": "copy completa e otimizada para o post (pt-BR)",
  "hashtags": ["#tag1", "#tag2", "#tag3", "#tag4", "#tag5"],
  "sugestoes": ["sugestão visual 1", "sugestão visual 2", "sugestão visual 3"]
}`;

          const prompt = `Crie um brief de design para:
Formato: ${FORMAT_OPTIONS.find(f => f.id === form.formato)?.label} (${FORMAT_OPTIONS.find(f => f.id === form.formato)?.size}px)
Tipo de Material: ${TEMPLATE_OPTIONS.find(t => t.id === form.template)?.label}
Título: ${form.titulo}
${form.subtitulo ? `Subtítulo: ${form.subtitulo}` : ""}
${form.mensagem ? `Mensagem: ${form.mensagem}` : ""}
${form.selo ? `Selo/Badge: ${form.selo}` : ""}
${form.cta ? `CTA: ${form.cta}` : ""}
Fundo: ${form.bgStyle}
Tamanho do título: ${form.tamanhoTitulo}
${form.notas ? `Notas: ${form.notas}` : ""}`;

          const raw = await callClaude(prompt, system);
          const jsonStr = raw.replace(/```json|```/g, "").trim();
          const parsed = JSON.parse(jsonStr);
          setResult(parsed);
        } catch (e) {
          setResult({ error: e.message || "Erro ao gerar. Verifique a API Key e tente novamente." });
        }
        setLoading(false);
      };

      const openCanva = () => {
        const q = encodeURIComponent(`Bernhoeft ${result.canvaQuery} navy blue red corporate legal`);
        window.open(`https://www.canva.com/search/templates?q=${q}`, "_blank");
      };

      const resetForm = () => {
        setResult(null);
        setStep(0);
        setForm({ formato:"square", template:"conteudo", titulo:"", subtitulo:"", mensagem:"", selo:"", rodape:"", cta:"", bgStyle:"escuro", tamanhoTitulo:"grande", notas:"" });
      };

      const progress = ((step + 1) / STEPS.length) * 100;

      const btnPrimary = {
        background: COLORS.red, color:"#fff", border:"none",
        borderRadius:8, padding:"12px 28px", fontWeight:700, fontSize:13,
        cursor:"pointer", fontFamily:"'Noto Sans', sans-serif", transition:"background 0.2s",
      };
      const btnSecondary = {
        background:"transparent", color:COLORS.gray,
        border:`1px solid rgba(255,255,255,0.1)`,
        borderRadius:8, padding:"12px 24px", fontWeight:600, fontSize:13,
        cursor:"pointer", fontFamily:"'Noto Sans', sans-serif",
      };

      return (
        <div style={{ minHeight:"100vh", background:"#060E1A", fontFamily:"'Noto Sans', sans-serif", color:"#fff", position:"relative", overflow:"hidden" }}>
          <GeometricBg />

          {/* API Key Banner */}
          <div style={{ position:"relative", zIndex:2 }}>
            <ApiKeyBanner apiKey={apiKey} onSave={saveApiKey} />
          </div>

          {/* Header */}
          <div style={{
            position:"relative", zIndex:1,
            borderBottom:"1px solid rgba(255,255,255,0.07)",
            padding:"20px 32px",
            display:"flex", alignItems:"center", justifyContent:"space-between",
          }}>
            <div style={{ display:"flex", alignItems:"center", gap:14 }}>
              <div style={{
                width:40, height:40, background:COLORS.red,
                borderRadius:10, display:"flex", alignItems:"center", justifyContent:"center",
                fontWeight:900, fontSize:14, letterSpacing:-1, flexShrink:0,
              }}>BC</div>
              <div>
                <div style={{ fontWeight:800, fontSize:16, letterSpacing:0.5 }}>BERNHOEFT CÁLCULOS</div>
                <div style={{ color:COLORS.gray, fontSize:10, letterSpacing:2, textTransform:"uppercase" }}>Agente de Marketing</div>
              </div>
            </div>
            <div style={{ color:COLORS.gray, fontSize:11, letterSpacing:1 }}>@bernhoeftcalc</div>
          </div>

          {/* Progress bar */}
          <div style={{ height:2, background:"rgba(255,255,255,0.04)", position:"relative", zIndex:1 }}>
            <div style={{ height:"100%", width:`${progress}%`, background:COLORS.red, transition:"width 0.4s ease" }} />
          </div>

          {/* Step tabs */}
          <div style={{ display:"flex", position:"relative", zIndex:1, borderBottom:"1px solid rgba(255,255,255,0.06)" }}>
            {STEPS.map((s, i) => (
              <button key={i} onClick={() => i < step + 1 && setStep(i)} style={{
                flex:1, padding:"12px 8px",
                background: i === step ? "rgba(231,76,60,0.08)" : "transparent",
                border:"none", borderBottom: i === step ? `2px solid ${COLORS.red}` : "2px solid transparent",
                color: i === step ? "#fff" : i < step ? COLORS.gray : "rgba(255,255,255,0.2)",
                fontSize:11, fontWeight: i === step ? 700 : 400,
                cursor: i <= step ? "pointer" : "default",
                transition:"all 0.2s", letterSpacing:0.5,
                fontFamily:"'Noto Sans', sans-serif",
              }}>
                <span style={{ marginRight:4, fontSize:12 }}>
                  {i < step ? "✓" : `0${i+1}`}
                </span>
                {s}
              </button>
            ))}
          </div>

          {/* Main */}
          <div style={{ maxWidth:820, margin:"0 auto", padding:"36px 24px", position:"relative", zIndex:1 }}>

            {/* STEP 0 — Formato */}
            {step === 0 && (
              <div className="fade-in">
                <h2 style={{ fontWeight:800, fontSize:22, marginBottom:6 }}>Escolha o Formato</h2>
                <p style={{ color:COLORS.gray, fontSize:13, marginBottom:28 }}>Selecione onde o material será publicado.</p>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:14 }}>
                  {FORMAT_OPTIONS.map(f => (
                    <button key={f.id} onClick={() => set("formato", f.id)} style={{
                      background: form.formato === f.id ? "rgba(231,76,60,0.12)" : "rgba(255,255,255,0.03)",
                      border: `1.5px solid ${form.formato === f.id ? COLORS.red : "rgba(255,255,255,0.1)"}`,
                      borderRadius:10, padding:"20px",
                      cursor:"pointer", textAlign:"left", transition:"all 0.2s",
                      color:"#fff", fontFamily:"'Noto Sans', sans-serif",
                    }}>
                      <div style={{ fontSize:28, marginBottom:10 }}>{f.icon}</div>
                      <div style={{ fontWeight:700, fontSize:14, marginBottom:4 }}>{f.label}</div>
                      <div style={{ color:COLORS.gray, fontSize:11 }}>{f.size}px</div>
                    </button>
                  ))}
                </div>

                <div style={{ marginTop:32, textAlign:"right" }}>
                  <button onClick={() => setStep(1)} style={btnPrimary}>Próximo →</button>
                </div>
              </div>
            )}

            {/* STEP 1 — Template */}
            {step === 1 && (
              <div className="fade-in">
                <h2 style={{ fontWeight:800, fontSize:22, marginBottom:6 }}>Tipo de Material</h2>
                <p style={{ color:COLORS.gray, fontSize:13, marginBottom:28 }}>Qual é o objetivo do post?</p>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr 1fr", gap:12 }}>
                  {TEMPLATE_OPTIONS.map(t => (
                    <button key={t.id} onClick={() => set("template", t.id)} style={{
                      background: form.template === t.id ? "rgba(231,76,60,0.12)" : "rgba(255,255,255,0.03)",
                      border: `1.5px solid ${form.template === t.id ? COLORS.red : "rgba(255,255,255,0.1)"}`,
                      borderRadius:10, padding:"18px 14px",
                      cursor:"pointer", textAlign:"center", transition:"all 0.2s",
                      color:"#fff", fontFamily:"'Noto Sans', sans-serif",
                    }}>
                      <div style={{ fontSize:26, marginBottom:8 }}>{t.icon}</div>
                      <div style={{ fontWeight:600, fontSize:12 }}>{t.label}</div>
                    </button>
                  ))}
                </div>

                <div style={{ marginTop:32, display:"flex", justifyContent:"space-between" }}>
                  <button onClick={() => setStep(0)} style={btnSecondary}>← Voltar</button>
                  <button onClick={() => setStep(2)} style={btnPrimary}>Próximo →</button>
                </div>
              </div>
            )}

            {/* STEP 2 — Conteúdo */}
            {step === 2 && (
              <div className="fade-in">
                <h2 style={{ fontWeight:800, fontSize:22, marginBottom:6 }}>Conteúdo do Material</h2>
                <p style={{ color:COLORS.gray, fontSize:13, marginBottom:28 }}>Preencha as informações do post.</p>

                <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:28 }}>
                  <div>
                    <Field label="Título Principal *">
                      <input value={form.titulo} onChange={e => set("titulo", e.target.value)}
                        placeholder="Ex: Prazo Prescricional nas Ações Trabalhistas" style={inputStyle} />
                    </Field>
                    <Field label="Subtítulo">
                      <input value={form.subtitulo} onChange={e => set("subtitulo", e.target.value)}
                        placeholder="Ex: O que todo advogado precisa saber" style={inputStyle} />
                    </Field>
                    <Field label="Mensagem Principal">
                      <textarea value={form.mensagem} onChange={e => set("mensagem", e.target.value)}
                        placeholder="Texto do post ou detalhes do conteúdo..."
                        rows={4} style={{ ...inputStyle, resize:"vertical" }} />
                    </Field>
                    <Field label="Selo / Badge">
                      <input value={form.selo} onChange={e => set("selo", e.target.value)}
                        placeholder="Ex: EDIÇÃO EXCLUSIVA | NOVO" style={inputStyle} />
                    </Field>
                  </div>
                  <div>
                    <Field label="Botão CTA">
                      <input value={form.cta} onChange={e => set("cta", e.target.value)}
                        placeholder="Ex: Saiba Mais | Inscreva-se" style={inputStyle} />
                    </Field>

                    <Field label="Estilo de Fundo">
                      <div style={{ display:"flex", gap:8, flexWrap:"wrap" }}>
                        {[
                          { id:"escuro",    label:"Azul Escuro"   },
                          { id:"preto",     label:"Preto Premium" },
                          { id:"gradiente", label:"Gradiente"     },
                          { id:"branco",    label:"Branco Limpo"  },
                        ].map(b => (
                          <Chip key={b.id} active={form.bgStyle === b.id} onClick={() => set("bgStyle", b.id)}>
                            {b.label}
                          </Chip>
                        ))}
                      </div>
                    </Field>

                    <Field label="Tamanho do Título">
                      <div style={{ display:"flex", gap:8 }}>
                        {[
                          { id:"pequeno", label:"Pequeno" },
                          { id:"medio",   label:"Médio"   },
                          { id:"grande",  label:"Grande"  },
                        ].map(b => (
                          <Chip key={b.id} active={form.tamanhoTitulo === b.id} onClick={() => set("tamanhoTitulo", b.id)}>
                            {b.label}
                          </Chip>
                        ))}
                      </div>
                    </Field>

                    <Field label="Notas Adicionais">
                      <textarea value={form.notas} onChange={e => set("notas", e.target.value)}
                        placeholder="Informações extras: data do evento, palestrante, local..."
                        rows={3} style={{ ...inputStyle, resize:"vertical" }} />
                    </Field>
                  </div>
                </div>

                <div style={{ marginTop:32, display:"flex", justifyContent:"space-between" }}>
                  <button onClick={() => setStep(1)} style={btnSecondary}>← Voltar</button>
                  <button onClick={() => setStep(3)} disabled={!form.titulo} style={{
                    ...btnPrimary,
                    background: form.titulo ? COLORS.red : "rgba(255,255,255,0.05)",
                    color: form.titulo ? "#fff" : COLORS.gray,
                    cursor: form.titulo ? "pointer" : "default",
                  }}>Ver Preview →</button>
                </div>
              </div>
            )}

            {/* STEP 3 — Preview & Gerar */}
            {step === 3 && (
              <div className="fade-in">
                <h2 style={{ fontWeight:800, fontSize:22, marginBottom:6 }}>Preview & Geração</h2>
                <p style={{ color:COLORS.gray, fontSize:13, marginBottom:24 }}>Confira o preview e gere o brief para o Canva.</p>

                <Section title="Preview do Material">
                  <LivePreview form={form} />
                  <div style={{ marginTop:10, display:"flex", gap:8, flexWrap:"wrap" }}>
                    <span style={{ background:"rgba(255,255,255,0.06)", borderRadius:6, padding:"4px 10px", fontSize:11, color:COLORS.gray }}>
                      {FORMAT_OPTIONS.find(f => f.id === form.formato)?.label}
                    </span>
                    <span style={{ background:"rgba(255,255,255,0.06)", borderRadius:6, padding:"4px 10px", fontSize:11, color:COLORS.gray }}>
                      {TEMPLATE_OPTIONS.find(t => t.id === form.template)?.label}
                    </span>
                  </div>
                </Section>

                <Section title="Brief do Material">
                  <div style={{
                    background:"rgba(255,255,255,0.03)", border:"1px solid rgba(255,255,255,0.08)",
                    borderRadius:10, padding:"18px 20px",
                  }}>
                    {[
                      ["Título",    form.titulo   ],
                      ["Subtítulo", form.subtitulo],
                      ["Mensagem",  form.mensagem ],
                      ["Selo",      form.selo     ],
                      ["CTA",       form.cta      ],
                      ["Fundo",     form.bgStyle  ],
                      ["Notas",     form.notas    ],
                    ].filter(([, v]) => v).map(([k, v]) => (
                      <div key={k} style={{ display:"flex", gap:12, marginBottom:10, fontSize:12 }}>
                        <span style={{ color:COLORS.gray, minWidth:80, fontWeight:600 }}>{k}:</span>
                        <span style={{ color:"#fff", lineHeight:1.5 }}>{v}</span>
                      </div>
                    ))}
                  </div>
                </Section>

                {!result && !loading && (
                  <button onClick={generateBrief} style={{
                    width:"100%", background:COLORS.red, color:"#fff", border:"none",
                    borderRadius:10, padding:"16px", fontWeight:800, fontSize:15,
                    cursor:"pointer", letterSpacing:0.5,
                    display:"flex", alignItems:"center", justifyContent:"center", gap:10,
                    fontFamily:"'Noto Sans', sans-serif",
                  }}>
                    🚀 Gerar Brief com IA
                  </button>
                )}

                {loading && (
                  <div style={{ textAlign:"center", padding:"40px", color:COLORS.gray }}>
                    <div style={{ fontSize:32, marginBottom:14, display:"inline-block", animation:"spin 1.2s linear infinite" }}>⚙️</div>
                    <p style={{ fontSize:13 }}>Gerando brief de design com IA...</p>
                  </div>
                )}

                {result && !result.error && (
                  <div className="fade-in">
                    <Section title="Resultado da IA">
                      <div style={{
                        background:"rgba(46,204,113,0.06)", border:`1px solid rgba(46,204,113,0.2)`,
                        borderRadius:10, padding:"20px",
                      }}>
                        <div style={{ marginBottom:18 }}>
                          <div style={{ color:COLORS.gray, fontSize:10, letterSpacing:2, fontWeight:700, marginBottom:8 }}>COPY FINAL</div>
                          <div style={{ color:"#fff", fontSize:13, lineHeight:1.7 }}>{result.copyFinal}</div>
                        </div>
                        {result.hashtags?.length > 0 && (
                          <div style={{ marginBottom:16 }}>
                            <div style={{ color:COLORS.gray, fontSize:10, letterSpacing:2, fontWeight:700, marginBottom:8 }}>HASHTAGS</div>
                            <div style={{ display:"flex", flexWrap:"wrap", gap:6 }}>
                              {result.hashtags.map(h => (
                                <span key={h} style={{ background:"rgba(255,255,255,0.06)", borderRadius:6, padding:"4px 10px", fontSize:11, color:COLORS.gray }}>
                                  {h}
                                </span>
                              ))}
                            </div>
                          </div>
                        )}
                        {result.sugestoes?.length > 0 && (
                          <div>
                            <div style={{ color:COLORS.gray, fontSize:10, letterSpacing:2, fontWeight:700, marginBottom:8 }}>SUGESTÕES DE DESIGN</div>
                            {result.sugestoes.map((s, i) => (
                              <div key={i} style={{ display:"flex", gap:10, alignItems:"flex-start", marginBottom:8, fontSize:12, color:"rgba(255,255,255,0.75)" }}>
                                <span style={{ color:COLORS.red, fontWeight:700, flexShrink:0 }}>→</span> {s}
                              </div>
                            ))}
                          </div>
                        )}
                      </div>
                    </Section>

                    <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:12 }}>
                      <button onClick={openCanva} style={{
                        background:"#7B2FBE", color:"#fff", border:"none",
                        borderRadius:10, padding:"14px", fontWeight:700, fontSize:13,
                        cursor:"pointer", fontFamily:"'Noto Sans', sans-serif",
                      }}>
                        🎨 Buscar Template no Canva
                      </button>
                      <button onClick={resetForm} style={{
                        background:"transparent", color:COLORS.gray,
                        border:`1px solid rgba(255,255,255,0.1)`,
                        borderRadius:10, padding:"14px", fontWeight:600, fontSize:13,
                        cursor:"pointer", fontFamily:"'Noto Sans', sans-serif",
                      }}>
                        + Novo Material
                      </button>
                    </div>
                  </div>
                )}

                {result?.error && (
                  <div style={{ background:"rgba(231,76,60,0.1)", border:`1px solid rgba(231,76,60,0.3)`, borderRadius:10, padding:16, color:COLORS.red, fontSize:13, lineHeight:1.5 }}>
                    ⚠️ {result.error}
                  </div>
                )}

                {!result && !loading && (
                  <button onClick={() => setStep(2)} style={{ ...btnSecondary, marginTop:12 }}>
                    ← Editar Conteúdo
                  </button>
                )}
              </div>
            )}

          </div>

          {/* Footer */}
          <div style={{
            position:"relative", zIndex:1, borderTop:"1px solid rgba(255,255,255,0.06)",
            padding:"16px 32px", display:"flex", justifyContent:"space-between", alignItems:"center",
            marginTop:40,
          }}>
            <span style={{ color:"rgba(255,255,255,0.18)", fontSize:10, letterSpacing:1 }}>
              BERNHOEFT CÁLCULOS JUDICIAIS · AGENTE DE MARKETING v1.1
            </span>
            <div style={{ display:"flex", gap:6 }}>
              <div style={{ width:6, height:6, borderRadius:"50%", background:COLORS.red, opacity:0.7 }} />
              <div style={{ width:6, height:6, borderRadius:"50%", background:COLORS.navy }} />
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById("root"));
    root.render(<BernhoeftAgent />);
  </script>
</body>
</html>
